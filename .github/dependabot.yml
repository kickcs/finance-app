version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      typeorm:
        patterns:
          - "typeorm"
          - "@nestjs/typeorm"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "vue-*"
      tanstack:
        patterns:
          - "@tanstack/*"
      vueuse:
        patterns:
          - "@vueuse/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "docker"
    directory: "/docker/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/docker/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
