name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ===================
  # Build and Push Docker Images
  # ===================
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push backend image
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push frontend image
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================
  # Deploy to Server
  # ===================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,docker/postgres/init.sql"
          target: ~/finance-app
          overwrite: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_IMAGE_TAG: ${{ github.sha }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,GHCR_IMAGE_TAG,DATABASE_PASSWORD,JWT_SECRET,CORS_ORIGIN,GHCR_TOKEN,GHCR_USER
          script: |
            cd ~/finance-app

            # Create/update environment file
            cat > .env << EOF
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY
            GHCR_IMAGE_TAG=$GHCR_IMAGE_TAG
            DATABASE_NAME=my_finance
            DATABASE_USERNAME=postgres
            DATABASE_PASSWORD=$DATABASE_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            CORS_ORIGIN=$CORS_ORIGIN
            EOF

            # Login to GitHub Container Registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull latest images
            docker pull "ghcr.io/$GITHUB_REPOSITORY/backend:$GHCR_IMAGE_TAG"
            docker pull "ghcr.io/$GITHUB_REPOSITORY/frontend:$GHCR_IMAGE_TAG"

            # Stop and remove old containers
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # Start new containers
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images
            docker image prune -f

            # Wait for services to be healthy
            echo "Waiting for services to be healthy..."
            sleep 30

            # Check health
            curl -f http://localhost:8080/api/health || echo "Health check failed, but deployment completed"

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
          fi
