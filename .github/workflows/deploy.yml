name: CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUN_VERSION: '1.2.4'
  REGISTRY: ghcr.io

jobs:
  # ===================
  # Validate Backend (lint + test)
  # ===================
  validate-backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: my_finance_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: test-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-backend-${{ runner.os }}-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            bun-backend-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Backend lint
        working-directory: backend
        run: bun run lint

      - name: Backend tests
        working-directory: backend
        run: bun run test

  # ===================
  # Validate Frontend (type-check + build)
  # ===================
  validate-frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lockb') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend type-check and build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost/api
        run: bun run build

  # ===================
  # Build and Push Backend Docker Image
  # ===================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-backend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ===================
  # Build and Push Frontend Docker Image
  # ===================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-frontend
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ===================
  # Deploy to Server
  # ===================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,docker/postgres/init.sql"
          target: ~/finance-app
          overwrite: true

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_IMAGE_TAG: ${{ github.sha }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,GHCR_IMAGE_TAG,DATABASE_PASSWORD,JWT_SECRET,CORS_ORIGIN,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd ~/finance-app

            # Create/update environment file
            cat > .env << EOF
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY
            GHCR_IMAGE_TAG=$GHCR_IMAGE_TAG
            DATABASE_NAME=my_finance
            DATABASE_USERNAME=postgres
            DATABASE_PASSWORD=$DATABASE_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            CORS_ORIGIN=$CORS_ORIGIN
            DATABASE_SYNCHRONIZE=false
            EOF

            chmod 600 .env

            # Login to GitHub Container Registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new images in parallel (postgres stays untouched)
            docker compose -f docker-compose.prod.yml pull backend frontend

            # Ensure postgres is running (no-op if already up)
            docker compose -f docker-compose.prod.yml up -d postgres
            echo "Waiting for postgres..."
            for i in $(seq 1 15); do
              if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                echo "Postgres ready"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "Postgres failed to become ready"
                docker compose -f docker-compose.prod.yml logs postgres --tail=30
                exit 1
              fi
              sleep 1
            done

            # Run database migrations on already-running postgres
            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm --no-deps -T backend npx typeorm migration:run -d dist/config/data-source.js

            # Recreate only backend and frontend with new images (postgres keeps running)
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend frontend

            # Wait for health check
            echo "Waiting for services to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "Health check passed after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed after 30s"
                docker compose -f docker-compose.prod.yml logs --tail=50
                exit 1
              fi
              sleep 1
            done

            # Clean up old images in background (non-blocking)
            docker image prune -f > /dev/null 2>&1 &

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
          fi
