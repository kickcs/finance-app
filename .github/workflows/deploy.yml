name: CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  BUN_VERSION: '1.2.4'
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================
  # Detect which services changed
  # ===================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/backend/**'
            frontend:
              - 'frontend/**'
              - 'docker/frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'docker/postgres/**'
              - 'docker/alloy/**'

  # ===================
  # Backend: lint + test + build & push image
  # ===================
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: my_finance_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: test-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-backend-${{ runner.os }}-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            bun-backend-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Backend lint
        working-directory: backend
        run: bun run lint

      - name: Backend tests
        working-directory: backend
        run: bun run test

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Pre-pull backend image on server
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin 2>/dev/null
            docker pull "$IMAGE" > /dev/null 2>&1

  # ===================
  # Frontend: type-check + build & push image
  # ===================
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lockb') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend type-check and build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost/api
        run: bun run build

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Pre-pull frontend image on server
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin 2>/dev/null
            docker pull "$IMAGE" > /dev/null 2>&1

  # ===================
  # Deploy to Server
  # ===================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.changes.outputs.infra == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Copy files to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --relative -e "ssh -i ~/.ssh/deploy_key" \
            docker-compose.prod.yml docker/postgres/init.sql docker/alloy/config.alloy \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/finance-app/
          rm -f ~/.ssh/deploy_key

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_IMAGE_TAG: ${{ github.sha }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}
          LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
          LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID }}
          LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          GRAFANA_CLOUD_TEMPO_URL: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          GRAFANA_CLOUD_TEMPO_USER: ${{ secrets.GRAFANA_CLOUD_TEMPO_USER }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,GHCR_IMAGE_TAG,DATABASE_PASSWORD,JWT_SECRET,CORS_ORIGIN,GHCR_TOKEN,GHCR_USER,LEMONSQUEEZY_API_KEY,LEMONSQUEEZY_WEBHOOK_SECRET,LEMONSQUEEZY_STORE_ID,LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID,LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID,OPENAI_API_KEY,GRAFANA_CLOUD_API_KEY,GRAFANA_CLOUD_PROMETHEUS_URL,GRAFANA_CLOUD_PROMETHEUS_USER,GRAFANA_CLOUD_LOKI_URL,GRAFANA_CLOUD_LOKI_USER,GRAFANA_CLOUD_TEMPO_URL,GRAFANA_CLOUD_TEMPO_USER,BACKEND_CHANGED,FRONTEND_CHANGED,INFRA_CHANGED
          script: |
            set -e
            cd ~/finance-app

            # Preserve previous image tag if no new images were built
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$FRONTEND_CHANGED" = "true" ]; then
              IMAGE_TAG=$GHCR_IMAGE_TAG
            elif [ -f .env ]; then
              IMAGE_TAG=$(grep -oP '^\s*GHCR_IMAGE_TAG=\K\S+' .env || echo "$GHCR_IMAGE_TAG")
            else
              IMAGE_TAG=$GHCR_IMAGE_TAG
            fi

            # Create/update environment file (sed strips leading whitespace)
            sed 's/^ *//' > .env << EOF
            GITHUB_REPOSITORY=$GITHUB_REPOSITORY
            GHCR_IMAGE_TAG=$IMAGE_TAG
            DATABASE_NAME=my_finance
            DATABASE_USERNAME=postgres
            DATABASE_PASSWORD=$DATABASE_PASSWORD
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            CORS_ORIGIN=$CORS_ORIGIN
            DATABASE_SYNCHRONIZE=false
            LEMONSQUEEZY_API_KEY=$LEMONSQUEEZY_API_KEY
            LEMONSQUEEZY_WEBHOOK_SECRET=$LEMONSQUEEZY_WEBHOOK_SECRET
            LEMONSQUEEZY_STORE_ID=$LEMONSQUEEZY_STORE_ID
            LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID=$LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID
            LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID=$LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID
            OPENAI_API_KEY=$OPENAI_API_KEY
            GRAFANA_CLOUD_API_KEY=$GRAFANA_CLOUD_API_KEY
            GRAFANA_CLOUD_PROMETHEUS_URL=$GRAFANA_CLOUD_PROMETHEUS_URL
            GRAFANA_CLOUD_PROMETHEUS_USER=$GRAFANA_CLOUD_PROMETHEUS_USER
            GRAFANA_CLOUD_LOKI_URL=$GRAFANA_CLOUD_LOKI_URL
            GRAFANA_CLOUD_LOKI_USER=$GRAFANA_CLOUD_LOKI_USER
            GRAFANA_CLOUD_TEMPO_URL=$GRAFANA_CLOUD_TEMPO_URL
            GRAFANA_CLOUD_TEMPO_USER=$GRAFANA_CLOUD_TEMPO_USER
            OTEL_EXPORTER_OTLP_ENDPOINT=http://finance-alloy:4317
            EOF

            chmod 600 .env

            # Login to GitHub Container Registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Determine which services have new images vs infra-only restart
            PULL_SERVICES=""
            RESTART_SERVICES=""

            if [ "$BACKEND_CHANGED" = "true" ]; then
              PULL_SERVICES="backend"
              RESTART_SERVICES="backend alloy"
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES frontend"
              RESTART_SERVICES="$RESTART_SERVICES frontend"
            fi
            if [ "$INFRA_CHANGED" = "true" ]; then
              RESTART_SERVICES="$RESTART_SERVICES backend frontend alloy"
            fi

            # Deduplicate
            PULL_SERVICES=$(echo "$PULL_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            RESTART_SERVICES=$(echo "$RESTART_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

            echo "Services with new images: ${PULL_SERVICES:-none}"
            echo "Services to restart: ${RESTART_SERVICES:-none}"

            if [ -z "$RESTART_SERVICES" ]; then
              echo "No services to deploy"
              exit 0
            fi

            # Pull only services that have new images (others keep current image)
            if [ -n "$PULL_SERVICES" ]; then
              docker compose -f docker-compose.prod.yml pull $PULL_SERVICES
            fi

            # Run migrations only if backend has a new image
            if echo "$PULL_SERVICES" | grep -q "backend"; then
              # Ensure postgres is running
              docker compose -f docker-compose.prod.yml up -d postgres
              echo "Waiting for postgres..."
              for i in $(seq 1 15); do
                if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                  echo "Postgres ready"
                  break
                fi
                if [ "$i" -eq 15 ]; then
                  echo "Postgres failed to become ready"
                  docker compose -f docker-compose.prod.yml logs postgres --tail=30
                  exit 1
                fi
                sleep 1
              done

              echo "Running database migrations..."
              docker compose -f docker-compose.prod.yml run --rm --no-deps -T backend \
                npx typeorm migration:run -d dist/config/data-source.js
            fi

            # Recreate services, wait for health checks
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate --wait --wait-timeout 60 $RESTART_SERVICES

            # Clean up old images (fire-and-forget, detached from SSH session)
            nohup sh -c '
              for svc in backend frontend; do
                docker images "ghcr.io/*/finance-app/$svc" --format "{{.ID}} {{.CreatedAt}}" \
                  | sort -k2 -r | tail -n +4 | awk "{print \$1}" \
                  | xargs -r docker rmi -f 2>/dev/null || true
              done
              docker image prune -f > /dev/null 2>&1
            ' > /dev/null 2>&1 &

      - name: Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "$DEPLOY_STATUS" == "success" ]; then
            EMOJI="✅"
            STATUS="Успешно"
          else
            EMOJI="❌"
            STATUS="Ошибка"
          fi

          TEXT="${EMOJI} <b>Deploy ${STATUS}</b>
          <b>Repo:</b> ${{ github.repository }}
          <b>Branch:</b> ${{ github.ref_name }}
          <b>Commit:</b> <code>${{ github.sha }}</code>
          <b>Сообщение:</b> $(echo "$COMMIT_MSG" | head -1)
          <b>Автор:</b> ${{ github.actor }}
          <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Открыть в GitHub Actions</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$TEXT" \
            -d disable_web_page_preview=true
