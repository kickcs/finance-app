name: CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, 'feat/**', 'fix/**', 'chore/**']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # 1.2.15+ required for `bun audit`
  BUN_VERSION: '1.2.15'
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===================
  # Detect which services changed
  # ===================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/backend/**'
            frontend:
              - 'frontend/**'
              - 'docker/frontend/**'
            infra:
              - 'docker-compose.prod.yml'
              - 'docker/postgres/**'
              - 'docker/alloy/**'

  # ===================
  # Backend: lint + test + build & push image
  # ===================
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: my_finance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: my_finance_test
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: test-secret-key
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-backend-${{ runner.os }}-${{ hashFiles('backend/bun.lockb') }}
          restore-keys: |
            bun-backend-${{ runner.os }}-

      - name: Install backend dependencies
        working-directory: backend
        run: bun install --frozen-lockfile

      - name: Audit backend dependencies
        working-directory: backend
        run: bun audit --audit-level=high
        continue-on-error: true

      - name: Backend lint
        working-directory: backend
        run: bun run lint

      - name: Backend tests
        working-directory: backend
        run: bun run test

      - name: Apply migrations for E2E
        working-directory: backend
        run: bun run migration:run

      - name: Backend E2E tests
        working-directory: backend
        run: bun run test:e2e

      - name: Set up Docker Buildx
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Pre-pull backend image on server
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin 2>/dev/null
            docker pull "$IMAGE" > /dev/null 2>&1

  # ===================
  # Frontend: type-check + build & push image
  # ===================
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('frontend/bun.lockb') }}
          restore-keys: |
            bun-frontend-${{ runner.os }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend
        run: bun audit --audit-level=high
        continue-on-error: true

      - name: Frontend tests
        working-directory: frontend
        run: bun run test

      - name: Frontend type-check and build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost/api
        run: bun run build

      - name: Set up Docker Buildx
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Pre-pull frontend image on server
        if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin 2>/dev/null
            docker pull "$IMAGE" > /dev/null 2>&1

  # ===================
  # Deploy to Server
  # ===================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch') &&
      !contains(needs.*.result, 'failure') &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success' || needs.changes.outputs.infra == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Copy files to server
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Prefer the pinned host key from secrets to defend against MITM on
          # first connection. Fall back to ssh-keyscan with a warning so the
          # pipeline keeps working until the secret is configured.
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "::warning::SSH_KNOWN_HOSTS secret not set — trusting host on first connect (MITM risk)"
            ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts
          rsync -avz --relative -e "ssh -i ~/.ssh/deploy_key" \
            docker-compose.prod.yml docker/postgres/init.sql docker/alloy/config.alloy docker/env.prod.template \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/finance-app/
          rm -f ~/.ssh/deploy_key

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GHCR_IMAGE_TAG: ${{ github.sha }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}
          LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
          LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID }}
          LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID: ${{ secrets.LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          GRAFANA_CLOUD_TEMPO_URL: ${{ secrets.GRAFANA_CLOUD_TEMPO_URL }}
          GRAFANA_CLOUD_TEMPO_USER: ${{ secrets.GRAFANA_CLOUD_TEMPO_USER }}
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
          INFRA_CHANGED: ${{ needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_REPOSITORY,GHCR_IMAGE_TAG,DATABASE_PASSWORD,JWT_SECRET,CORS_ORIGIN,GHCR_TOKEN,GHCR_USER,LEMONSQUEEZY_API_KEY,LEMONSQUEEZY_WEBHOOK_SECRET,LEMONSQUEEZY_STORE_ID,LEMONSQUEEZY_PREMIUM_MONTHLY_VARIANT_ID,LEMONSQUEEZY_PREMIUM_YEARLY_VARIANT_ID,OPENAI_API_KEY,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY,VAPID_SUBJECT,GRAFANA_CLOUD_API_KEY,GRAFANA_CLOUD_PROMETHEUS_URL,GRAFANA_CLOUD_PROMETHEUS_USER,GRAFANA_CLOUD_LOKI_URL,GRAFANA_CLOUD_LOKI_USER,GRAFANA_CLOUD_TEMPO_URL,GRAFANA_CLOUD_TEMPO_USER,BACKEND_CHANGED,FRONTEND_CHANGED,INFRA_CHANGED
          script: |
            set -e
            cd ~/finance-app

            # Capture currently-deployed tag for potential rollback
            PREVIOUS_TAG=""
            if [ -f .env ]; then
              PREVIOUS_TAG=$(grep -oP '^\s*GHCR_IMAGE_TAG=\K\S+' .env || echo "")
            fi

            # Preserve previous image tag if no new images were built
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$FRONTEND_CHANGED" = "true" ]; then
              IMAGE_TAG=$GHCR_IMAGE_TAG
            elif [ -n "$PREVIOUS_TAG" ]; then
              IMAGE_TAG=$PREVIOUS_TAG
            else
              IMAGE_TAG=$GHCR_IMAGE_TAG
            fi

            # Render .env from the versioned template. envsubst only substitutes
            # ${VAR} placeholders for variables exported in this shell — adding a new
            # required env var means updating both docker/env.prod.template AND the
            # `envs:` whitelist above.
            export GHCR_IMAGE_TAG="$IMAGE_TAG"
            if [ ! -f docker/env.prod.template ]; then
              echo "::error::docker/env.prod.template missing on server — rsync step failed?"
              exit 1
            fi
            envsubst < docker/env.prod.template > .env
            chmod 600 .env

            # Sanity-check: every placeholder should have been resolved.
            if grep -qE '\$\{[A-Z_]+\}' .env; then
              echo "::error::Unresolved \${VAR} placeholders in .env — missing exports:"
              grep -nE '\$\{[A-Z_]+\}' .env
              exit 1
            fi

            # Login to GitHub Container Registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Determine which services have new images vs infra-only restart
            PULL_SERVICES=""
            RESTART_SERVICES=""

            if [ "$BACKEND_CHANGED" = "true" ]; then
              PULL_SERVICES="backend"
              RESTART_SERVICES="backend alloy"
            fi
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              PULL_SERVICES="$PULL_SERVICES frontend"
              RESTART_SERVICES="$RESTART_SERVICES frontend"
            fi
            if [ "$INFRA_CHANGED" = "true" ]; then
              RESTART_SERVICES="$RESTART_SERVICES backend frontend alloy"
            fi

            # Deduplicate
            PULL_SERVICES=$(echo "$PULL_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            RESTART_SERVICES=$(echo "$RESTART_SERVICES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

            echo "Services with new images: ${PULL_SERVICES:-none}"
            echo "Services to restart: ${RESTART_SERVICES:-none}"

            if [ -z "$RESTART_SERVICES" ]; then
              echo "No services to deploy"
              exit 0
            fi

            # Pull only services that have new images (others keep current image)
            if [ -n "$PULL_SERVICES" ]; then
              docker compose -f docker-compose.prod.yml pull $PULL_SERVICES
            fi

            # Run migrations only if backend has a new image
            if echo "$PULL_SERVICES" | grep -q "backend"; then
              # Ensure postgres is running
              docker compose -f docker-compose.prod.yml up -d postgres
              echo "Waiting for postgres..."
              for i in $(seq 1 15); do
                if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres > /dev/null 2>&1; then
                  echo "Postgres ready"
                  break
                fi
                if [ "$i" -eq 15 ]; then
                  echo "Postgres failed to become ready"
                  docker compose -f docker-compose.prod.yml logs postgres --tail=30
                  exit 1
                fi
                sleep 1
              done

              echo "Running database migrations..."
              docker compose -f docker-compose.prod.yml run --rm --no-deps -T backend \
                npx typeorm migration:run -d dist/config/data-source.js
            fi

            # Recreate services, wait for health checks. On failure, roll back to the
            # previously deployed tag (if we have one and it differs from the new tag).
            # Note: this rolls back the image only — database migrations are not reverted,
            # so all migrations must remain backward-compatible with the previous release.
            if ! docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate --wait --wait-timeout 90 $RESTART_SERVICES; then
              echo "::error::Deploy failed health check"
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=80 $RESTART_SERVICES || true

              if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$IMAGE_TAG" ]; then
                echo "Rolling back to previous tag: $PREVIOUS_TAG"
                sed -i "s|^GHCR_IMAGE_TAG=.*|GHCR_IMAGE_TAG=$PREVIOUS_TAG|" .env
                if docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate --wait --wait-timeout 60 $RESTART_SERVICES; then
                  echo "::warning::Rolled back to $PREVIOUS_TAG"
                else
                  echo "::error::Rollback also failed — manual intervention required"
                fi
              else
                # Same-tag redeploy (workflow_dispatch on current SHA, or empty .env).
                # --force-recreate has already destroyed the prior containers, so try to
                # bring them back up without recreating again to recover from a transient
                # health-check flake. If this also fails, manual intervention is required.
                echo "::warning::No different previous tag available — attempting in-place restart"
                if docker compose -f docker-compose.prod.yml up -d --no-deps --wait --wait-timeout 60 $RESTART_SERVICES; then
                  echo "::warning::Recovered after retry"
                else
                  echo "::error::Recovery failed — manual intervention required"
                fi
              fi
              exit 1
            fi

            # Post-deploy smoke check. Scope to what was actually redeployed so an
            # unrelated backend outage cannot trigger a false rollback of a healthy
            # frontend-only release.
            SMOKE_FAILED=0
            if [ "$BACKEND_CHANGED" = "true" ] || [ "$INFRA_CHANGED" = "true" ]; then
              # Backend was touched: verify /api/health through nginx (covers full stack).
              if ! docker compose -f docker-compose.prod.yml exec -T frontend \
                  wget --no-verbose --tries=2 --spider http://127.0.0.1:80/api/health 2>/dev/null; then
                echo "::error::Smoke check failed: /api/health not reachable through nginx"
                docker compose -f docker-compose.prod.yml logs --tail=40 backend frontend || true
                SMOKE_FAILED=1
              fi
            elif [ "$FRONTEND_CHANGED" = "true" ]; then
              # Frontend-only deploy: only verify nginx is serving, do not depend on backend.
              if ! docker compose -f docker-compose.prod.yml exec -T frontend \
                  wget --no-verbose --tries=2 --spider http://127.0.0.1:80/health 2>/dev/null; then
                echo "::error::Smoke check failed: nginx /health not reachable"
                docker compose -f docker-compose.prod.yml logs --tail=40 frontend || true
                SMOKE_FAILED=1
              fi
            fi
            if [ "$SMOKE_FAILED" = "1" ]; then
              exit 1
            fi

            # Clean up old images (fire-and-forget, detached from SSH session).
            # docker images does not expand middle wildcards in the reference filter,
            # so we filter by the concrete repository derived from GITHUB_REPOSITORY.
            REPO_LC=$(echo "ghcr.io/$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
            nohup sh -c "
              for svc in backend frontend; do
                docker images '${REPO_LC}/'\$svc --format '{{.ID}} {{.CreatedAt}}' \
                  | sort -k2 -r | tail -n +4 | awk '{print \$1}' \
                  | xargs -r docker rmi -f 2>/dev/null || true
              done
              docker image prune -f > /dev/null 2>&1
            " > /dev/null 2>&1 &

  # ===================
  # Notify Telegram about the final pipeline state.
  # Runs even when an upstream job fails, so red master builds are visible.
  # ===================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [changes, build-backend, build-frontend, deploy]
    # Notify for both master pushes and manual workflow_dispatch runs;
    # PRs from feature branches stay quiet.
    if: |
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/master') ||
       github.event_name == 'workflow_dispatch')
    steps:
      - name: Determine pipeline status
        id: status
        env:
          BACKEND_RESULT: ${{ needs.build-backend.result }}
          FRONTEND_RESULT: ${{ needs.build-frontend.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          # Treat any failure/cancellation as a red build. "skipped" is benign
          # (paths-filter said nothing to build) and we don't notify in that case.
          if [ "$BACKEND_RESULT" = "failure" ] || [ "$FRONTEND_RESULT" = "failure" ] || [ "$DEPLOY_RESULT" = "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            FAILED=""
            [ "$BACKEND_RESULT" = "failure" ] && FAILED="$FAILED backend"
            [ "$FRONTEND_RESULT" = "failure" ] && FAILED="$FAILED frontend"
            [ "$DEPLOY_RESULT" = "failure" ] && FAILED="$FAILED deploy"
            echo "failed_jobs=${FAILED# }" >> "$GITHUB_OUTPUT"
          elif [ "$BACKEND_RESULT" = "cancelled" ] || [ "$FRONTEND_RESULT" = "cancelled" ] || [ "$DEPLOY_RESULT" = "cancelled" ]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
          elif [ "$DEPLOY_RESULT" = "success" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            # Builds passed but deploy was skipped (e.g. only infra-irrelevant change) — stay quiet.
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram message
        if: steps.status.outputs.status != 'skipped'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPELINE_STATUS: ${{ steps.status.outputs.status }}
          FAILED_JOBS: ${{ steps.status.outputs.failed_jobs }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Use a literal newline ($'\n') so the failed-jobs line renders as a
          # real new line in Telegram; "\n" in a double-quoted string is NOT
          # interpreted by bash and would appear as backslash-n in the message.
          NL=$'\n'
          case "$PIPELINE_STATUS" in
            success)   EMOJI="✅"; STATUS="Успешно";  EXTRA="" ;;
            failure)   EMOJI="❌"; STATUS="Ошибка";   EXTRA="${NL}<b>Упало:</b> ${FAILED_JOBS}" ;;
            cancelled) EMOJI="⏹"; STATUS="Отменено"; EXTRA="" ;;
            *)         EMOJI="⚠"; STATUS="Unknown ($PIPELINE_STATUS)"; EXTRA="" ;;
          esac

          TEXT="${EMOJI} <b>Deploy ${STATUS}</b>
          <b>Repo:</b> ${{ github.repository }}
          <b>Branch:</b> ${{ github.ref_name }}
          <b>Commit:</b> <code>${{ github.sha }}</code>
          <b>Сообщение:</b> $(echo "$COMMIT_MSG" | head -1)
          <b>Автор:</b> ${{ github.actor }}${EXTRA}
          <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Открыть в GitHub Actions</a>"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$TEXT" \
            -d disable_web_page_preview=true
