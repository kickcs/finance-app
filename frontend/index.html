<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA Meta Tags -->

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ouro Finance">
    <link rel="apple-touch-icon" href="/logo-192.png">

    <!-- iOS PWA Splash Screens (light + dark for each device) -->

    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1320x2868-dark.png" media="(prefers-color-scheme: dark) and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone 16 Pro -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1206x2622-light.png" media="(prefers-color-scheme: light) and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1206x2622-dark.png" media="(prefers-color-scheme: dark) and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone 15 Pro Max / 16 Plus / 14 Pro Max -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1290x2796-light.png" media="(prefers-color-scheme: light) and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1290x2796-dark.png" media="(prefers-color-scheme: dark) and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone 15 Pro / 16 -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1179x2556-light.png" media="(prefers-color-scheme: light) and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1179x2556-dark.png" media="(prefers-color-scheme: dark) and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone 14 / 15 / 16 -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1170x2532-light.png" media="(prefers-color-scheme: light) and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1170x2532-dark.png" media="(prefers-color-scheme: dark) and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone SE 3rd gen -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-750x1334-light.png" media="(prefers-color-scheme: light) and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-750x1334-dark.png" media="(prefers-color-scheme: dark) and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <!-- iPhone 12/13 mini -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1125x2436-light.png" media="(prefers-color-scheme: light) and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1125x2436-dark.png" media="(prefers-color-scheme: dark) and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)">
    <!-- iPhone 8 Plus -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1242x2208-light.png" media="(prefers-color-scheme: light) and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1242x2208-dark.png" media="(prefers-color-scheme: dark) and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)">

    <!-- DNS Prefetch / Preconnect for external services -->
    <link rel="dns-prefetch" href="https://app.ouro-finance.top">
    <link rel="preconnect" href="https://app.ouro-finance.top" crossorigin>

    <!-- Inter font is now self-hosted via @fontsource-variable/inter -->
    <!-- Icons provided by lucide-vue-next (bundled SVGs, no external requests) -->

    <!-- Prevent white flash on load + Initial loading skeleton -->
    <style>
      /* Critical CSS - inlined for instant render */
      html, body, #app {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #FAFAFA;
        font-family: 'Inter Variable', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html.dark, html.dark body, html.dark #app {
        background-color: #09090B;
      }

      /* Initial loading skeleton */
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 1000;
        background-color: #FAFAFA;
        display: flex;
        flex-direction: column;
        padding: 1rem;
        padding-top: max(env(safe-area-inset-top), 1rem);
        transition: opacity 0.3s ease-out;
        opacity: 1;
      }
      html.dark .app-loading {
        background-color: #09090B;
      }
      .app-loading .skeleton {
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 1rem;
      }
      html.dark .app-loading .skeleton {
        background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
        background-size: 200% 100%;
      }
      .app-loading .header {
        height: 3.5rem;
        margin-bottom: 2rem;
      }
      .app-loading .balance-card {
        height: 12rem;
        margin-bottom: 1.25rem;
      }
      .app-loading .stats-row {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .app-loading .stats-row .stat {
        flex: 1;
        height: 5.5rem;
      }
      .app-loading .section-header {
        height: 1.5rem;
        width: 6rem;
        margin-bottom: 0.75rem;
      }
      .app-loading .card {
        height: 4.5rem;
        margin-bottom: 0.5rem;
      }

      /* Desktop initial skeleton styles */
      @media (min-width: 768px) {
        .app-loading {
          flex-direction: row;
          padding: 0;
        }
        
        /* Left Sidebar Skeleton */
        .app-loading .desktop-sidebar {
          display: flex;
          width: 18rem; /* 72px * 4 = 288px */
          height: 100dvh;
          border-right: 1px solid #e5e7eb;
          padding: 1.5rem 1rem;
          flex-direction: column;
          flex-shrink: 0;
        }
        html.dark .app-loading .desktop-sidebar {
          border-right-color: #27272a;
        }
        .app-loading .sidebar-user { height: 3rem; margin-bottom: 2rem; border-radius: 0.75rem; }
        .app-loading .sidebar-balance { height: 6rem; margin-bottom: 2rem; border-radius: 1rem; }
        .app-loading .sidebar-nav { height: 3rem; margin-bottom: 0.5rem; border-radius: 0.75rem; }
        
        /* Main Content Area */
        .app-loading .desktop-main {
          display: flex;
          flex: 1;
          padding: 2rem;
        }
        .app-loading .desktop-main-inner {
          display: grid;
          grid-template-columns: repeat(12, 1fr);
          gap: 2rem;
          max-width: 80rem;
          margin: 0 auto;
          width: 100%;
        }
        
        /* Left Column (5/12) */
        .app-loading .col-left {
          grid-column: span 5 / span 5;
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
        }
        
        /* Right Column (7/12) */
        .app-loading .col-right {
          grid-column: span 7 / span 7;
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
        }
        
        .app-loading .desktop-large-card {
          height: 18rem;
          border-radius: 1.5rem;
        }
        .app-loading .desktop-medium-card {
          height: 12rem;
          border-radius: 1.5rem;
        }
        
        /* Hide mobile elements */
        .app-loading > .skeleton:not(.desktop-sidebar):not(.desktop-main),
        .app-loading > .stats-row {
          display: none;
        }
      }
      
      /* Hide desktop elements on mobile */
      @media (max-width: 767px) {
        .app-loading .desktop-sidebar,
        .app-loading .desktop-main {
          display: none;
        }
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Hide loading skeleton when app is ready - using body.app-ready class */
      body.app-ready .app-loading {
        opacity: 0;
        pointer-events: none;
      }

    </style>

    <!-- Theme detection script - runs before render -->
    <script>
      (function() {
        var raw = localStorage.getItem('theme') || 'system';
        try { raw = JSON.parse(raw); } catch(e) {}
        var t = raw || 'system';
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = t === 'dark' || (t === 'system' && d);
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
        document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#09090B' : '#FAFAFA');
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Loading skeleton shown until Vue app is ready -->
    <div class="app-loading" aria-hidden="true">
      <!-- Mobile Skeleton Elements -->
      <div class="skeleton header"></div>
      <div class="skeleton balance-card"></div>
      <div class="stats-row">
        <div class="skeleton stat"></div>
        <div class="skeleton stat"></div>
      </div>
      <div class="skeleton section-header"></div>
      <div class="skeleton card"></div>
      <div class="skeleton card"></div>

      <!-- Desktop Skeleton Elements -->
      <div class="desktop-sidebar">
        <div class="skeleton sidebar-user"></div>
        <div class="skeleton sidebar-balance"></div>
        <div class="skeleton sidebar-nav"></div>
        <div class="skeleton sidebar-nav"></div>
        <div class="skeleton sidebar-nav"></div>
        <div class="skeleton sidebar-nav"></div>
      </div>
      
      <div class="desktop-main">
        <div class="desktop-main-inner">
          <div class="col-left">
            <div class="skeleton balance-card" style="height: 14rem; margin-bottom: 0;"></div>
            <div class="skeleton" style="height: 6rem;"></div>
            <div class="skeleton desktop-large-card" style="height: 24rem;"></div>
          </div>
          <div class="col-right">
            <div class="skeleton desktop-large-card" style="height: 26rem;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
              <div class="skeleton desktop-medium-card"></div>
              <div class="skeleton desktop-medium-card"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
