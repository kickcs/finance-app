    <!-- Prevent white flash on load + Initial loading skeleton -->
    <style>
      /* Critical CSS - inlined for instant render */
      html, body, #app {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #f8f9fa;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      html.dark, html.dark body, html.dark #app {
        background-color: #0f1115;
      }

      /* Initial loading skeleton */
      .app-loading {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 1rem;
        padding-top: max(env(safe-area-inset-top), 1rem);
      }
      .app-loading .skeleton {
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 1rem;
      }
      html.dark .app-loading .skeleton {
        background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
        background-size: 200% 100%;
      }
      .app-loading .header {
        height: 3.5rem;
        margin-bottom: 2rem;
      }
      .app-loading .balance-card {
        height: 12rem;
        margin-bottom: 1.25rem;
      }
      .app-loading .stats-row {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }
      .app-loading .stats-row .stat {
        flex: 1;
        height: 5.5rem;
      }
      .app-loading .section-header {
        height: 1.5rem;
        width: 6rem;
        margin-bottom: 0.75rem;
      }
      .app-loading .card {
        height: 4.5rem;
        margin-bottom: 0.5rem;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* Hide loading skeleton when app is ready */
      #app:not(:empty) + .app-loading,
      #app:has(*) ~ .app-loading {
        display: none;
      }

      /* Prevent icon text flash (FOIT) while Material Symbols font loads */
      /* Icons will be invisible until font is ready, preventing text flash */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined', sans-serif;
        font-weight: 400;
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: 'liga';
      }
    </style>

    <!-- Theme detection script - runs before render -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'system';
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (t === 'dark' || (t === 'system' && d)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>

    <!-- Loading skeleton shown until Vue app renders -->
    <div class="app-loading" aria-hidden="true">
      <div class="skeleton header"></div>
      <div class="skeleton balance-card"></div>
      <div class="stats-row">
        <div class="skeleton stat"></div>
        <div class="skeleton stat"></div>
      </div>
      <div class="skeleton section-header"></div>
      <div class="skeleton card"></div>
      <div class="skeleton card"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
