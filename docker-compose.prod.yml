# Production Docker Compose
# Uses pre-built images from GitHub Container Registry (GHCR)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set via .env or export):
#   - DATABASE_PASSWORD
#   - JWT_SECRET
#   - API_URL (for frontend build)
#   - GHCR_IMAGE_TAG (defaults to 'latest')

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: finance-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:-my_finance}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-my_finance}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - finance-network
    # No exposed ports in production - only internal access

  # NestJS Backend
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/finance-app}/backend:${GHCR_IMAGE_TAG:-latest}
    container_name: finance-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-my_finance}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - finance-network
    # No exposed ports - accessed via frontend nginx proxy

  # Vue 3 Frontend
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/finance-app}/frontend:${GHCR_IMAGE_TAG:-latest}
    container_name: finance-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - finance-network

volumes:
  postgres_data:
    driver: local

networks:
  finance-network:
    driver: bridge
